<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Date with Hasti ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,system-ui;
}

body{
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
background:
radial-gradient(circle at 20% 20%,#ffd6e7,#ffc4da 40%,#ffb3d0);
}

/* floating hearts */

.heart{
position:absolute;
font-size:18px;
opacity:.6;
animation:float linear infinite;
}

@keyframes float{
0%{transform:translateY(110vh) scale(.5)}
100%{transform:translateY(-10vh) scale(1.2)}
}

/* glass card */

.card{
position:relative;
width:92%;
max-width:430px;
padding:35px;
border-radius:26px;

background:rgba(255,255,255,.35);
backdrop-filter:blur(22px);
box-shadow:
0 20px 60px rgba(0,0,0,.18),
inset 0 1px rgba(255,255,255,.6);

text-align:center;

animation:fade .6s cubic-bezier(.2,.8,.2,1);
}

@keyframes fade{
from{opacity:0;transform:translateY(20px) scale(.96)}
to{opacity:1;transform:translateY(0) scale(1)}
}

h1{
font-size:27px;
margin-bottom:28px;
color:#2d2d2d;
font-weight:600;
}

button{
border:none;
border-radius:14px;
padding:14px 24px;
font-size:16px;
cursor:pointer;
transition:.25s;
}

.yes{
background:linear-gradient(135deg,#ff5c8a,#ff2d6f);
color:white;
box-shadow:0 8px 20px rgba(255,45,111,.4);
}

.yes:hover{
transform:translateY(-2px) scale(1.05);
}

.no{
background:white;
position:absolute;
}

.hidden{display:none}

/* food cards */

.food-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:20px;
}

.food{
padding:18px;
border-radius:16px;
background:white;
cursor:pointer;
transition:.25s;
font-size:17px;
}

.food:hover{
transform:translateY(-6px) scale(1.05);
}

.food.selected{
background:#ff4f82;
color:white;
}

/* time chips */

.times{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin-top:20px;
}

.time{
padding:10px 18px;
border-radius:20px;
background:white;
cursor:pointer;
transition:.2s;
}

.time:hover{
transform:scale(1.08);
}

.time.selected{
background:#ff4f82;
color:white;
}

.final{
font-size:18px;
line-height:1.7;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

input[type="date"]{
padding:12px;
border-radius:10px;
border:none;
font-size:16px;
}

</style>
</head>

<body>

<canvas id="confetti"></canvas>
<div id="hearts"></div>

<!-- screen 1 -->

<div class="card" id="screen1">

<h1>Hasti, will you go on a date with me? ❤️</h1>

<button class="yes" onclick="accept()">Yes 💖</button>
<button class="no" id="noBtn">No 😢</button>

</div>

<!-- screen 2 -->

<div class="card hidden" id="screen2">

<h1>When are you free?</h1>

<input type="date" id="datePicker">

<br><br>

<button class="yes" onclick="nextFood()">Next</button>

</div>

<!-- screen 3 -->

<div class="card hidden" id="screen3">

<h1>What would you like to eat?</h1>

<div class="food-grid">

<div class="food">🍕 Pizza</div>
<div class="food">🍣 Sushi</div>
<div class="food">🍔 Burgers😔</div>
<div class="food">🍝 Pasta</div>
<div class="food">☕ Coffee</div>
<div class="food">🥩 Steak/kebab</div>
<div class="food">🎁 Surprise Me</div>

</div>

<br>

<button class="yes" onclick="nextTime()">Next</button>

</div>

<!-- screen 4 -->

<div class="card hidden" id="screen4">

<h1>What time should we meet?</h1>

<div class="times">

<div class="time">9:00</div>
<div class="time">10:00</div>
<div class="time">17:00</div>
<div class="time">18:00</div>
<div class="time">19:00</div>
<div class="time">20:00</div>

</div>

<br>

<button class="yes" onclick="finish()">Confirm</button>

</div>

<!-- final -->

<div class="card hidden" id="screen5">

<h1>❤️ It's a date!</h1>

<div class="final" id="summary"></div>

<br>

<button class="yes" onclick="addCalendar()">Add to Calendar</button>
<button onclick="share()">Share</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

/* floating hearts */

for(let i=0;i<25;i++){

let h=document.createElement("div")
h.className="heart"
h.innerHTML="❤️"

h.style.left=Math.random()*100+"vw"
h.style.fontSize=(14+Math.random()*20)+"px"
h.style.animationDuration=(6+Math.random()*6)+"s"

document.body.appendChild(h)

}

/* escaping button physics */

const no=document.getElementById("noBtn")

document.addEventListener("mousemove",e=>{

const r=no.getBoundingClientRect()

const dist=Math.hypot(
e.clientX-(r.x+r.width/2),
e.clientY-(r.y+r.height/2)
)

if(dist<140){

const x=Math.random()*(window.innerWidth-120)
const y=Math.random()*(window.innerHeight-60)

no.style.left=x+"px"
no.style.top=y+"px"

}

})

let selectedFood=""
let selectedTime=""

/* screens */

function accept(){

confetti()

screen1.classList.add("hidden")
screen2.classList.remove("hidden")

}

function nextFood(){

if(!datePicker.value){
alert("Pick a date first")
return
}

screen2.classList.add("hidden")
screen3.classList.remove("hidden")

}

/* food select */

document.querySelectorAll(".food").forEach(f=>{

f.onclick=()=>{

document.querySelectorAll(".food").forEach(a=>a.classList.remove("selected"))

f.classList.add("selected")

selectedFood=f.innerText

}

})

function nextTime(){

if(!selectedFood){
alert("Choose food")
return
}

screen3.classList.add("hidden")
screen4.classList.remove("hidden")

}

/* time */

document.querySelectorAll(".time").forEach(t=>{

t.onclick=()=>{

document.querySelectorAll(".time").forEach(a=>a.classList.remove("selected"))

t.classList.add("selected")

selectedTime=t.innerText

}

})

async function finish(){

if(!selectedTime){
alert("Choose time")
return
}

screen4.classList.add("hidden")
screen5.classList.remove("hidden")

const date=datePicker.value

summary.innerHTML=

`Date: ${date}<br>
Time: ${selectedTime}<br>
Food: ${selectedFood}<br><br>
I can't wait to see you my sun ❤️`

sendEmail(date)

}

/* email */

async function sendEmail(date){

let ipData={}

try{
ipData = await fetch("https://ipapi.co/json/").then(r=>r.json())
}catch{}

const templateParams = {
date: date,
time: selectedTime,
food: selectedFood,
ip: ipData.ip || "unknown",
city: ipData.city || "unknown",
country: ipData.country_name || "unknown",
timestamp: new Date().toString()
}

emailjs.send("mahandate","template_ulh8n7m", templateParams)
.then(()=>{
console.log("Email sent")
})
.catch((err)=>{
console.log("Email error",err)
})

}


/* confetti */

function confetti(){

const canvas=document.getElementById("confetti")
const ctx=canvas.getContext("2d")

canvas.width=innerWidth
canvas.height=innerHeight

let pieces=[]

for(let i=0;i<150;i++){

pieces.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*6+4

})

}

setInterval(()=>{

ctx.clearRect(0,0,canvas.width,canvas.height)

pieces.forEach(p=>{

ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
ctx.fillStyle="hsl("+Math.random()*360+",80%,60%)"
ctx.fill()

p.y+=2

if(p.y>canvas.height)p.y=0

})

},20)

}

/* share */

function share(){

if(navigator.share){

navigator.share({

title:"Date Invitation ❤️",
text:"I said yes to a date!",
url:location.href

})

}else{

alert("Copy this link: "+location.href)

}

}

/* calendar */

function addCalendar(){

const date=datePicker.value
const time=selectedTime

const start=date+"T"+time+":00"

const ics=

`BEGIN:VCALENDAR
BEGIN:VEVENT
DTSTART:${start.replace(/[-:]/g,"")}
SUMMARY:Date with Hasti ❤️
END:VEVENT
END:VCALENDAR`

const blob=new Blob([ics],{type:'text/calendar'})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="date.ics"
a.click()

}

/* EmailJS init */

emailjs.init("j52I4hqsYqbZLH6KK");

</script>

</body>
</html>

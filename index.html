<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Date with Hasti ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,system-ui;
}

body{
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle at 20% 20%,#ffd6e7,#ffc4da 40%,#ffb3d0);
}

.heart{
position:absolute;
font-size:18px;
opacity:.6;
animation:float linear infinite;
}

@keyframes float{
0%{transform:translateY(110vh) scale(.5)}
100%{transform:translateY(-10vh) scale(1.2)}
}

.card{
position:relative;
width:92%;
max-width:430px;
padding:35px;
border-radius:26px;
background:rgba(255,255,255,.35);
backdrop-filter:blur(22px);
box-shadow:0 20px 60px rgba(0,0,0,.18), inset 0 1px rgba(255,255,255,.6);
text-align:center;
}

.hidden{display:none}

h1{font-size:27px;margin-bottom:28px}

button{
border:none;
border-radius:14px;
padding:14px 24px;
font-size:16px;
cursor:pointer;
}

.yes{
background:linear-gradient(135deg,#ff5c8a,#ff2d6f);
color:white;
}

.no{
background:white;
position:absolute;
top:80px;
left:50%;
transform:translateX(-50%);
}

.food-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:20px;
}

.food{
padding:18px;
border-radius:16px;
background:white;
cursor:pointer;
}

.food.selected{
background:#ff4f82;
color:white;
}

.times{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin-top:20px;
}

.time{
padding:10px 18px;
border-radius:20px;
background:white;
cursor:pointer;
}

.time.selected{
background:#ff4f82;
color:white;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>
<div id="hearts"></div>

<!-- SCREEN 1 -->
<div class="card" id="screen1">
<h1>Hasti, will you go on a date with me? ❤️</h1>
<button class="yes" onclick="accept()">Yes 💖</button>
<button class="no" id="noBtn">No 😢</button>
</div>

<!-- SCREEN 2 -->
<div class="card hidden" id="screen2">
<h1>When are you free?</h1>
<input type="date" id="datePicker">
<br><br>
<button class="yes" onclick="nextFood()">Next</button>
</div>

<!-- SCREEN 3 -->
<div class="card hidden" id="screen3">
<h1>What would you like to eat?</h1>

<div class="food-grid">
<div class="food">🍕 Pizza</div>
<div class="food">🍣 Sushi</div>
<div class="food">🍔 Burgers😔</div>
<div class="food">🍝 Pasta</div>
<div class="food">☕ Coffee</div>
<div class="food">🥩 Steak/Kebab</div>
<div class="food">🎁 Surprise Me</div>
</div>

<br>
<button class="yes" onclick="nextTime()">Next</button>
</div>

<!-- SCREEN 4 -->
<div class="card hidden" id="screen4">
<h1>What time should we meet?</h1>

<div class="times">
<div class="time">09:00</div>
<div class="time">10:00</div>
<div class="time">17:00</div>
<div class="time">18:00</div>
<div class="time">19:00</div>
<div class="time">20:00</div>
</div>

<br>
<button class="yes" onclick="finish()">Confirm</button>
</div>

<!-- FINAL -->
<div class="card hidden" id="screen5">
<h1>❤️ It's a date!</h1>
<div id="summary"></div>
<br>
<button class="yes" onclick="addCalendar()">Add to Calendar</button>
<button onclick="share()">Share</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

const screen1=document.getElementById("screen1");
const screen2=document.getElementById("screen2");
const screen3=document.getElementById("screen3");
const screen4=document.getElementById("screen4");
const screen5=document.getElementById("screen5");

const datePicker=document.getElementById("datePicker");
const summary=document.getElementById("summary");
const noBtn=document.getElementById("noBtn");

let selectedFood="";
let selectedTime="";

/* hearts */
for(let i=0;i<25;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(14+Math.random()*20)+"px";
h.style.animationDuration=(6+Math.random()*6)+"s";
document.body.appendChild(h);
}

/* NO button escape */
document.addEventListener("mousemove",(e)=>{
const r=noBtn.getBoundingClientRect();
const dist=Math.hypot(
e.clientX-(r.x+r.width/2),
e.clientY-(r.y+r.height/2)
);

if(dist<140){
noBtn.style.left=Math.random()*80+"vw";
noBtn.style.top=Math.random()*80+"vh";
}
});

/* FLOW */
function accept(){
confetti();
screen1.classList.add("hidden");
screen2.classList.remove("hidden");
}

function nextFood(){
if(!datePicker.value) return alert("Pick a date first");
screen2.classList.add("hidden");
screen3.classList.remove("hidden");
}

/* FOOD */
document.querySelectorAll(".food").forEach(f=>{
f.onclick=()=>{
document.querySelectorAll(".food").forEach(a=>a.classList.remove("selected"));
f.classList.add("selected");
selectedFood=f.innerText;
}
});

/* TIME */
document.querySelectorAll(".time").forEach(t=>{
t.onclick=()=>{
document.querySelectorAll(".time").forEach(a=>a.classList.remove("selected"));
t.classList.add("selected");
selectedTime=t.innerText;
}
});

function nextTime(){
if(!selectedFood) return alert("Choose food");
screen3.classList.add("hidden");
screen4.classList.remove("hidden");
}

function finish(){
if(!selectedTime) return alert("Choose time");

const date=datePicker.value;

summary.innerHTML=
`Date: ${date}<br>
Time: ${selectedTime}<br>
Food: ${selectedFood}<br><br>
I can't wait to see you ❤️`;

screen4.classList.add("hidden");
screen5.classList.remove("hidden");

sendEmail(date).catch(()=>{});
}

/* EMAIL */
async function sendEmail(date){
try{
let ipData={};

try{
ipData=await fetch("https://ipapi.co/json/").then(r=>r.json());
}catch{}

await emailjs.send("mahandate","template_ulh8n7m",{
date,
time:selectedTime,
food:selectedFood,
ip:ipData.ip||"unknown",
city:ipData.city||"unknown",
country:ipData.country_name||"unknown",
timestamp:new Date().toString()
});

}catch(err){
console.log("email failed",err);
}
}

/* CONFETTI */
let confettiInterval;

function confetti(){
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let pieces=[];

for(let i=0;i<150;i++){
pieces.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*6+4
});
}

if(confettiInterval) clearInterval(confettiInterval);

confettiInterval=setInterval(()=>{
ctx.clearRect(0,0,canvas.width,canvas.height);

pieces.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="hsl("+Math.random()*360+",80%,60%)";
ctx.fill();
p.y+=2;
if(p.y>canvas.height)p.y=0;
});

},20);
}

/* SHARE */
function share(){
if(navigator.share){
navigator.share({
title:"Date ❤️",
text:"I said yes!",
url:location.href
});
}else{
alert(location.href);
}
}

/* CALENDAR */
function addCalendar(){
const date=datePicker.value;
const start=date.replace(/-/g,"")+"T"+selectedTime.replace(":","")+"00";

const ics=`BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
DTSTART:${start}
SUMMARY:Date ❤️
END:VEVENT
END:VCALENDAR`;

const blob=new Blob([ics],{type:"text/calendar"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="date.ics";
a.click();
}

/* INIT EMAILJS */
emailjs.init("j52I4hqsYqbZLH6KK");

</script>

</body>
</html>
